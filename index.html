<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG-Naratif | Portal Komik & Novel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff4655; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; color: var(--text); overflow-x: hidden; }
        
        /* Nav ala Premium */
        nav { background: #020617; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.8rem; font-weight: 900; color: white; cursor: pointer; letter-spacing: -1px; }
        .logo span { color: var(--primary); }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* Search Bar */
        .search-bar { width: 100%; padding: 18px; border-radius: 12px; border: 2px solid #334155; background: var(--card); color: white; margin: 20px 0; font-size: 1rem; transition: 0.3s; }
        .search-bar:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 15px rgba(255, 70, 85, 0.3); }

        /* Grid Komik Portrait */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; position: relative; transition: 0.4s; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .card:hover { transform: scale(1.05) translateY(-10px); }
        .card:hover::after { content: ''; position: absolute; inset: 0; border: 2px solid var(--primary); border-radius: 12px; pointer-events: none; }
        
        .cover-img { width: 100%; height: 240px; object-fit: cover; background: #334155; display: block; }
        .card-info { padding: 12px; background: linear-gradient(to top, #0f172a, transparent); }
        .card-info h3 { font-size: 0.95rem; margin: 5px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 700; }
        .card-info p { font-size: 0.8rem; color: var(--primary); margin: 0; font-weight: 600; }
        
        .genre-tag { position: absolute; top: 10px; left: 10px; background: var(--primary); color: white; padding: 3px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; z-index: 2; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        /* Reader Mode */
        .reader-header { text-align: center; padding: 60px 20px; background: #020617; border-radius: 0 0 50px 50px; margin-bottom: 30px; }
        .reader-box { max-width: 800px; margin: 0 auto; background: #1e293b; padding: 40px; border-radius: 20px; font-family: 'Lora', serif; font-size: 1.3rem; line-height: 2.2; color: #cbd5e1; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: 800; width: 100%; text-transform: uppercase; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }
        .paywall { text-align: center; padding: 40px; background: #020617; border-radius: 20px; margin-top: 20px; border: 2px dashed var(--primary); }
        .blurred { filter: blur(25px); pointer-events: none; height: 300px; overflow: hidden; opacity: 0.2; }

        .section { display: none; }
        .active { display: block; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        input, textarea, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; font-family: inherit; }
        footer { text-align: center; padding: 60px; opacity: 0.4; font-size: 0.85rem; border-top: 1px solid #1e293b; }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="showPage('home')">MG<span>NARATIF</span></div>
        <button onclick="checkAdmin()" style="background:var(--primary); color:white; border:none; padding:10px 20px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:0.7rem;">DASHBOARD</button>
    </nav>

    <div class="container">
        <section id="home" class="section active">
            <input type="text" id="searchInput" class="search-bar" placeholder="Cari tajuk komik/novel anda..." onkeyup="filterNovels()">
            <h2 style="font-size: 1.4rem; font-weight: 900; letter-spacing: 1px; color: var(--primary); margin-bottom: 25px;">TERBARU DI MG</h2>
            <div id="novel-grid" class="grid"></div>
        </section>

        <section id="write" class="section">
            <div style="background: var(--card); padding: 35px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);">
                <h2 style="margin:0 0 20px 0;">+ Terbitkan Karya Baru</h2>
                <input type="text" id="w-title" placeholder="Tajuk Karya">
                <input type="text" id="w-author" placeholder="Nama Penulis">
                <input type="text" id="w-cover" placeholder="Link Gambar Cover (Contoh: https://...)">
                <div style="display:flex; gap:15px;">
                    <select id="w-genre" style="flex:1;"><option>Aksi</option><option>Seram</option><option>Isekai</option><option>Cinta</option></select>
                    <input type="text" id="w-chapter" placeholder="Ep / Bab" style="flex:1;">
                </div>
                <textarea id="w-content" rows="12" placeholder="Tuliskan bab anda di sini..."></textarea>
                <button class="btn" onclick="saveNovel()">SIARKAN SEKARANG</button>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
                    <button class="btn" style="background:#475569; font-size:0.7rem;" onclick="exportData()">BACKUP</button>
                    <button class="btn" style="background:#475569; font-size:0.7rem;" onclick="document.getElementById('fileInput').click()">RESTORE</button>
                    <input type="file" id="fileInput" style="display:none" onchange="importData(event)">
                </div>
                <p onclick="showPage('home')" style="text-align:center; cursor:pointer; margin-top:20px; color:#94a3b8;">Kembali ke Utama</p>
            </div>
        </section>

        <section id="reader" class="section">
            <div class="reader-header">
                <span id="r-genre" style="background:var(--primary); padding:5px 15px; border-radius:8px; font-weight:900; font-size:0.8rem; text-transform:uppercase;"></span>
                <h1 id="r-title" style="margin: 20px 0 10px 0; font-size: 2.8rem; font-weight:900;"></h1>
                <p id="r-info" style="color: #94a3b8; font-weight: 600;"></p>
                <button class="btn" style="width:auto; background:#1e293b; margin-top:30px; border: 1px solid #334155;" onclick="showPage('home')">← KEMBALI KE SENARAI</button>
            </div>

            <div style="text-align:center; padding: 30px 0;">
                <script type="text/javascript">
                    atOptions = {'key' : '77fba6248804533f3fe2e33d020f89d0','format' : 'iframe','height' : 60,'width' : 468,'params' : {}};
                </script>
                <script type="text/javascript" src="https://www.highperformanceformat.com/77fba6248804533f3fe2e33d020f89d0/invoke.js"></script>
            </div>

            <div id="r-body" class="reader-box blurred"></div>

            <div id="paywall" class="paywall">
                <h2 style="color:var(--primary)">BAB TERKUNCI</h2>
                <p>Klik butang di bawah untuk tonton iklan dan buka bab penuh.</p>
                <button id="ad-btn" class="btn" style="max-width:350px;" onclick="unlock()">BUKA SEKARANG (5s)</button>
            </div>
            
            <div style="text-align:center; margin-top: 50px;">
                <script type="text/javascript">
                    atOptions = {'key' : '77fba6248804533f3fe2e33d020f89d0','format' : 'iframe','height' : 60,'width' : 468,'params' : {}};
                </script>
                <script type="text/javascript" src="https://www.highperformanceformat.com/77fba6248804533f3fe2e33d020f89d0/invoke.js"></script>
            </div>
        </section>
    </div>

    <footer>&copy; 2026 MG-Naratif | Built with Passion</footer>

    <script>
        // MENGGUNAKAN NAMA DATABASE BARU SUPAYA REFRESH TOTAL
        let db = JSON.parse(localStorage.getItem('mgn_final_v1')) || [];

        function showPage(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'home') renderHome(db);
            window.scrollTo(0,0);
        }

        function renderHome(data) {
            const grid = document.getElementById('novel-grid');
            grid.innerHTML = data.length ? data.map((n) => `
                <div class="card" onclick="openNovel('${n.id}')">
                    <span class="genre-tag">${n.genre}</span>
                    <img src="${n.cover || 'https://images.unsplash.com/photo-1543004286-64645f5aa458?w=400&h=600&fit=crop'}" class="cover-img" onerror="this.src='https://via.placeholder.com/200x300/1e293b/white?text=${n.title}'">
                    <div class="card-info">
                        <h3>${n.title}</h3>
                        <p>${n.chapter}</p>
                    </div>
                </div>
            `).reverse().join('') : "<p style='grid-column:1/-1; text-align:center; padding:50px; opacity:0.5;'>Belum ada update. Klik Dashboard!</p>";
        }

        function filterNovels() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            renderHome(db.filter(n => n.title.toLowerCase().includes(q) || n.author.toLowerCase().includes(q)));
        }

        function saveNovel() {
            const n = { id: Date.now().toString(), author: document.getElementById('w-author').value, title: document.getElementById('w-title').value, cover: document.getElementById('w-cover').value, genre: document.getElementById('w-genre').value, chapter: document.getElementById('w-chapter').value, content: document.getElementById('w-content').value };
            if(!n.title || !n.content) return alert("Tajuk & Isi wajib ada!");
            db.push(n); localStorage.setItem('mgn_final_v1', JSON.stringify(db));
            alert("Berjaya Disiarkan!"); showPage('home');
        }

        function openNovel(id) {
            const n = db.find(item => item.id === id);
            document.getElementById('r-title').innerText = n.title;
            document.getElementById('r-genre').innerText = n.genre;
            document.getElementById('r-info').innerText = `Oleh: ${n.author} | ${n.chapter}`;
            document.getElementById('r-body').innerText = n.content;
            document.getElementById('r-body').classList.add('blurred');
            document.getElementById('paywall').style.display = 'block';
            showPage('reader');
        }

        function unlock() {
            let b = document.getElementById('ad-btn'); let t = 5; b.disabled = true;
            let timer = setInterval(() => {
                b.innerText = `MEMBUKA DALAM ${t}s...`; t--;
                if(t < 0) { clearInterval(timer); document.getElementById('r-body').classList.remove('blurred'); document.getElementById('paywall').style.display = 'none'; b.disabled = false; b.innerText = "BUKA SEKARANG (5s)"; }
            }, 1000);
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", "mgn_backup.json"); dl.click();
        }

        function importData(e) {
            const r = new FileReader(); r.onload = (ev) => { db = JSON.parse(ev.target.result); localStorage.setItem('mgn_final_v1', JSON.stringify(db)); renderHome(db); showPage('home'); };
            r.readAsText(e.target.files[0]);
        }

        function checkAdmin() { if(prompt("KOD:") === "1234") showPage('write'); }

        renderHome(db);
    </script>
</body>
</html>

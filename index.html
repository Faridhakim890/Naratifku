<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MG-Naratif Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff4655; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        
        /* Layout Dasar Phone */
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; color: var(--text); -webkit-tap-highlight-color: transparent; }
        
        nav { background: #020617; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.4rem; font-weight: 900; color: white; letter-spacing: -1px; }
        .logo span { color: var(--primary); }

        .container { padding: 15px; max-width: 600px; margin: 0 auto; }

        /* Grid Komik Ala App */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .card { background: var(--card); border-radius: 10px; overflow: hidden; position: relative; border: 1px solid #334155; }
        
        .cover-img { width: 100%; height: 200px; object-fit: cover; background: #334155; display: block; }
        .card-info { padding: 8px; }
        .card-info h3 { font-size: 0.85rem; margin: 3px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Butang Hapus (Hanya untuk Admin) */
        .btn-delete { background: rgba(255,0,0,0.7); color: white; border: none; padding: 5px; font-size: 10px; width: 100%; cursor: pointer; }

        /* Slot Iklan */
        .ad-container { margin: 15px 0; text-align: center; min-height: 50px; background: rgba(255,255,255,0.03); border-radius: 5px; overflow: hidden; }

        /* Reader View */
        .reader-header { padding: 20px 10px; text-align: center; border-bottom: 1px solid #334155; }
        .reader-content { padding: 20px; font-size: 1.1rem; line-height: 1.8; color: #cbd5e1; }
        .blurred { filter: blur(20px); opacity: 0.2; pointer-events: none; }

        /* Global Buttons */
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: 800; cursor: pointer; margin-top: 10px; }
        .section { display: none; }
        .active { display: block; }

        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="location.reload()">MG<span>NARATIF</span></div>
        <button onclick="checkAdmin()" style="background:var(--card); color:white; border:1px solid var(--primary); padding:5px 12px; border-radius:5px; font-size:0.7rem;">ADMIN</button>
    </nav>

    <div class="container">
        <section id="home" class="section active">
            <div class="ad-container">
                <script type="text/javascript">
                    atOptions = { 'key' : '77fba6248804533f3fe2e33d020f89d0', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
                </script>
                <script type="text/javascript" src="//www.highperformanceformat.com/77fba6248804533f3fe2e33d020f89d0/invoke.js"></script>
            </div>

            <h3 style="font-size: 1rem; color: var(--primary); margin-bottom: 15px;">🔥 UPDATE TERKINI</h3>
            <div id="novel-grid" class="grid"></div>
        </section>

        <section id="admin" class="section">
            <div style="background: var(--card); padding: 20px; border-radius: 12px;">
                <h3 style="margin-top:0;">Urus Karya</h3>
                <input type="text" id="w-title" placeholder="Tajuk">
                <input type="text" id="w-author" placeholder="Penulis">
                <input type="text" id="w-cover" placeholder="Link Gambar Cover">
                <input type="text" id="w-chapter" placeholder="Bab (Contoh: Ch.1)">
                <textarea id="w-content" rows="8" placeholder="Isi cerita..."></textarea>
                <button class="btn" onclick="saveNovel()">SIARKAN SEKARANG</button>
                <button class="btn" style="background:#475569;" onclick="showPage('home')">KEMBALI</button>
            </div>
        </section>

        <section id="reader" class="section">
            <button onclick="showPage('home')" style="background:none; border:none; color:var(--primary); font-weight:bold; padding:10px 0;">← KEMBALI</button>
            <div class="reader-header">
                <h2 id="r-title" style="margin:0;"></h2>
                <p id="r-info" style="font-size:0.8rem; opacity:0.6;"></p>
            </div>

            <div class="ad-container">
                <script type="text/javascript">
                    atOptions = { 'key' : '77fba6248804533f3fe2e33d020f89d0', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
                </script>
                <script type="text/javascript" src="//www.highperformanceformat.com/77fba6248804533f3fe2e33d020f89d0/invoke.js"></script>
            </div>

            <div id="r-body" class="reader-content blurred"></div>

            <div id="paywall" style="text-align:center; padding:30px; background:#020617; border-radius:15px; margin-top:20px;">
                <p style="font-size:0.9rem;">Tonton iklan untuk buka bab penuh.</p>
                <button id="ad-btn" class="btn" onclick="unlock()">BUKA BAB (5s)</button>
            </div>
        </section>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('mgn_final_v4')) || [];
        let isAdminView = false;

        function showPage(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'home') renderHome(db);
            window.scrollTo(0,0);
        }

        function renderHome(data) {
            const grid = document.getElementById('novel-grid');
            grid.innerHTML = data.map((n) => `
                <div class="card">
                    <div onclick="openNovel('${n.id}')">
                        <img src="${n.cover || 'https://via.placeholder.com/200x300'}" class="cover-img">
                        <div class="card-info">
                            <h3>${n.title}</h3>
                            <p style="font-size:0.7rem; color:var(--primary)">${n.chapter}</p>
                        </div>
                    </div>
                    ${isAdminView ? `<button class="btn-delete" onclick="deleteNovel('${n.id}')">HAPUS</button>` : ''}
                </div>
            `).reverse().join('') || "<p style='grid-column:1/-1; text-align:center; opacity:0.5;'>Tiada karya lagi.</p>";
        }

        function saveNovel() {
            const n = { id: Date.now().toString(), author: document.getElementById('w-author').value, title: document.getElementById('w-title').value, cover: document.getElementById('w-cover').value, chapter: document.getElementById('w-chapter').value, content: document.getElementById('w-content').value };
            if(!n.title || !n.content) return alert("Sila isi tajuk dan cerita!");
            db.push(n); localStorage.setItem('mgn_final_v4', JSON.stringify(db));
            alert("Berjaya Disiarkan!"); showPage('home');
        }

        function deleteNovel(id) {
            if(confirm("Padam karya ini?")) {
                db = db.filter(item => item.id !== id);
                localStorage.setItem('mgn_final_v4', JSON.stringify(db));
                renderHome(db);
            }
        }

        function openNovel(id) {
            const n = db.find(item => item.id === id);
            document.getElementById('r-title').innerText = n.title;
            document.getElementById('r-info').innerText = `Artis: ${n.author} | ${n.chapter}`;
            document.getElementById('r-body').innerText = n.content;
            document.getElementById('r-body').classList.add('blurred');
            document.getElementById('paywall').style.display = 'block';
            showPage('reader');
        }

        function unlock() {
            let b = document.getElementById('ad-btn'); let t = 5; b.disabled = true;
            let timer = setInterval(() => {
                b.innerText = `Sila tunggu ${t}s...`; t--;
                if(t < 0) { clearInterval(timer); document.getElementById('r-body').classList.remove('blurred'); document.getElementById('paywall').style.display = 'none'; b.disabled = false; b.innerText = "BUKA BAB"; }
            }, 1000);
        }

        function checkAdmin() {
            let p = prompt("KOD ADMIN:");
            if(p === "1234") { isAdminView = true; showPage('admin'); }
            else if(p === "tutup") { isAdminView = false; renderHome(db); }
        }

        renderHome(db);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naratif.ku | Versi Sempurna</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #d35400; --dark: #1a1a1a; --light-bg: #fdfaf6; --white: #ffffff; --text: #2c3e50; }
        body.dark-mode { --light-bg: #121212; --white: #1e1e1e; --text: #e0e0e0; }
        body { font-family: 'Poppins', sans-serif; background: var(--light-bg); margin: 0; color: var(--text); transition: 0.3s; }
        
        nav { background: var(--white); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: 700; cursor: pointer; color: var(--text); }
        .logo span { color: var(--primary); }
        
        .search-bar { width: 100%; padding: 12px 20px; border-radius: 50px; border: 2px solid var(--primary); background: var(--white); color: var(--text); margin: 20px 0; box-sizing: border-box; }
        .hero { background: linear-gradient(135deg, #d35400 0%, #a04000 100%); color: white; padding: 40px 5%; text-align: center; border-radius: 0 0 40px 40px; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--white); border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid rgba(128,128,128,0.1); }
        .tag { background: rgba(211, 84, 0, 0.1); color: var(--primary); padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: 700; }
        .reader-box { background: var(--white); padding: 40px; border-radius: 25px; font-family: 'Lora', serif; font-size: 1.2rem; line-height: 1.8; margin-top: 20px; }
        .blurred { filter: blur(15px); pointer-events: none; height: 200px; overflow: hidden; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 10px; transition: 0.2s; }
        .btn:hover { opacity: 0.9; transform: scale(1.02); }
        .paywall { text-align: center; padding: 40px; background: var(--white); border-radius: 20px; margin-top: -80px; position: relative; z-index: 10; border: 1px solid rgba(128,128,128,0.1); }
        .section { display: none; }
        .active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ccc; background: var(--white); color: var(--text); box-sizing: border-box; }
        footer { text-align: center; padding: 40px; opacity: 0.6; font-size: 0.8rem; }
        .admin-tools { display: flex; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body id="body">

    <nav>
        <div class="logo" onclick="showPage('home')">Naratif<span>.ku</span></div>
        <div style="display: flex; gap: 10px;">
            <button onclick="document.getElementById('body').classList.toggle('dark-mode')" style="background:none; border:none; cursor:pointer; font-size:1.2rem;">🌓</button>
            <button onclick="checkAdmin()" style="background:var(--dark); color:white; border:none; padding:5px 15px; border-radius:50px; cursor:pointer; font-size:0.8rem;">✍️ Penulis</button>
        </div>
    </nav>

    <div id="hero" class="hero">
        <h1 style="margin:0;">Pustaka Digital Anda</h1>
        <p>Cari, baca, dan simpan karya anda dengan selamat.</p>
    </div>

    <div class="container">
        
        <section id="home" class="section active">
            <input type="text" id="searchInput" class="search-bar" placeholder="Cari tajuk atau penulis..." onkeyup="filterNovels()">
            <div id="novel-grid" class="grid"></div>
        </section>

        <section id="write" class="section">
            <div class="card">
                <h3>Panel Penulis</h3>
                <input type="text" id="w-author" placeholder="Nama Pena">
                <input type="text" id="w-title" placeholder="Tajuk Novel">
                <select id="w-genre">
                    <option value="Aksi">Aksi</option><option value="Seram">Seram</option>
                    <option value="Cinta">Cinta</option><option value="Misteri">Misteri</option>
                </select>
                <input type="text" id="w-chapter" placeholder="Bab Novel">
                <textarea id="w-content" rows="10" placeholder="Isi cerita..."></textarea>
                <button class="btn" onclick="saveNovel()">Terbitkan</button>
                
                <div class="admin-tools">
                    <button class="btn" style="background:#27ae60; font-size:0.7rem;" onclick="exportData()">📥 Backup Novel</button>
                    <button class="btn" style="background:#2980b9; font-size:0.7rem;" onclick="document.getElementById('fileInput').click()">📤 Restore Novel</button>
                    <input type="file" id="fileInput" style="display:none" onchange="importData(event)">
                </div>
                <center><p onclick="showPage('home')" style="cursor:pointer; opacity:0.5; margin-top:20px;">Batal</p></center>
            </div>
        </section>

        <section id="reader" class="section">
            <button onclick="showPage('home')" style="background:none; border:none; color:var(--primary); cursor:pointer; font-weight:bold;">← Kembali</button>
            <div style="text-align: center; margin: 20px 0;">
                <span id="r-genre" class="tag"></span>
                <h1 id="r-title" style="margin:10px 0; font-size: 2rem;"></h1>
                <p id="r-info" style="opacity:0.7;"></p>
            </div>

            <div style="text-align:center; margin: 20px 0;">
                <script type="text/javascript">
                    atOptions = {'key' : '77fba6248804533f3fe2e33d020f89d0','format' : 'iframe','height' : 60,'width' : 468,'params' : {}};
                </script>
                <script type="text/javascript" src="https://www.highperformanceformat.com/77fba6248804533f3fe2e33d020f89d0/invoke.js"></script>
            </div>

            <div id="r-body" class="reader-box blurred"></div>

            <div id="paywall" class="paywall">
                <h3>Sertai Pengembaraan</h3>
                <p>Kandungan dikunci seketika. Sila tunggu iklan selesai.</p>
                <button id="ad-btn" class="btn" style="max-width:250px;" onclick="unlock()">Buka Kandungan (5s)</button>
            </div>
        </section>
    </div>

    <footer>&copy; 2026 Naratif.ku | Ahmad Fauzi</footer>

    <script>
        let db = JSON.parse(localStorage.getItem('naratif_v3')) || [];

        function showPage(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('hero').style.display = (id === 'home') ? 'block' : 'none';
            if(id === 'home') renderHome(db);
            window.scrollTo(0,0);
        }

        function renderHome(data) {
            const grid = document.getElementById('novel-grid');
            grid.innerHTML = data.length ? data.map((n) => `
                <div class="card" onclick="openNovel('${n.id}')">
                    <span class="tag">${n.genre}</span>
                    <h3 style="margin:10px 0 5px 0;">${n.title}</h3>
                    <p style="font-size:0.8rem; opacity:0.7;">${n.author}</p>
                    <p style="color:var(--primary); font-weight:600; font-size:0.9rem; margin-top:10px;">${n.chapter}</p>
                </div>
            `).reverse().join('') : "<p style='grid-column:1/-1; text-align:center;'>Tiada novel.</p>";
        }

        function filterNovels() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            renderHome(db.filter(n => n.title.toLowerCase().includes(query) || n.author.toLowerCase().includes(query)));
        }

        function saveNovel() {
            const n = { id: Date.now().toString(), author: document.getElementById('w-author').value, title: document.getElementById('w-title').value, genre: document.getElementById('w-genre').value, chapter: document.getElementById('w-chapter').value, content: document.getElementById('w-content').value };
            if(!n.title || !n.content) return alert("Sila lengkapkan!");
            db.push(n); localStorage.setItem('naratif_v3', JSON.stringify(db));
            alert("Berjaya disiarkan!"); showPage('home');
        }

        function openNovel(id) {
            const n = db.find(item => item.id === id);
            document.getElementById('r-title').innerText = n.title;
            document.getElementById('r-genre').innerText = n.genre;
            document.getElementById('r-info').innerText = `Oleh ${n.author} | ${n.chapter}`;
            document.getElementById('r-body').innerText = n.content;
            document.getElementById('r-body').classList.add('blurred');
            document.getElementById('paywall').style.display = 'block';
            showPage('reader');
        }

        function unlock() {
            let b = document.getElementById('ad-btn'); let t = 5; b.disabled = true;
            let timer = setInterval(() => {
                b.innerText = `Sila tunggu ${t}s...`; t--;
                if(t < 0) { clearInterval(timer); document.getElementById('r-body').classList.remove('blurred'); document.getElementById('paywall').style.display = 'none'; b.disabled = false; b.innerText = "Buka Kandungan (5s)"; }
            }, 1000);
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", "naratif_backup.json");
            dlAnchorElem.click();
        }

        function importData(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                db = JSON.parse(e.target.result);
                localStorage.setItem('naratif_v3', JSON.stringify(db));
                alert("Novel berjaya dipulihkan!");
                showPage('home');
            };
            reader.readAsText(event.target.files[0]);
        }

        function checkAdmin() { if(prompt("Kod:") === "1234") showPage('write'); }

        renderHome(db);
    </script>
</body>
</html>
